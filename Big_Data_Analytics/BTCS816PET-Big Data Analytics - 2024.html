<h3>Definition</h3>
<p>The <strong>CAP Theorem</strong> (also called Brewer's Theorem) states that a distributed data system can only guarantee <strong>2 out of 3</strong> properties simultaneously: Consistency, Availability, and Partition Tolerance.</p>
<div class="diagram">              Consistency (C)
                    ▲
                   / \\
                  /   \\
         CA      /     \\    CP
                /       \\
               /         \\
   Availability ──────── Partition Tolerance
        (A)        AP         (P)</div>
<h3>The 3 Properties</h3>
<ul>
  <li><strong>Consistency (C)</strong>: All nodes see the same data at the same time.</li>
  <li><strong>Availability (A)</strong>: Every request gets a response (not always the latest data).</li>
  <li><strong>Partition Tolerance (P)</strong>: System continues even if network failures split nodes.</li>
</ul>
<h3>Relevance to Big Data</h3>
<p>In Big Data systems, <strong>network partitions always happen</strong> (P is mandatory). So systems must choose between C and A:</p>
<ul>
  <li><strong>CP systems</strong>: HBase, MongoDB — consistent but may reject requests.</li>
  <li><strong>AP systems</strong>: Cassandra, CouchDB — always available but data may be stale.</li>
</ul>

    content: `
<h3>Definition</h3>
<p>The <strong>Hadoop Framework</strong> is an open-source software platform for distributed storage and distributed processing of large datasets on commodity hardware clusters.</p>
<h3>Hadoop Framework Requirements</h3>
<ul>
  <li>Commodity (inexpensive) hardware — no specialized servers needed.</li>
  <li>Linux-based operating system.</li>
  <li>Java Runtime Environment (JRE).</li>
  <li>SSH (Secure Shell) for inter-node communication.</li>
</ul>
<h3>Core Design Principles of Hadoop</h3>
<ul>
  <li><strong>Move computation to data</strong>: Instead of moving huge data to the program, Hadoop sends the processing code to where the data already lives. This avoids expensive network transfers.</li>
  <li><strong>Fault tolerance by default</strong>: Hardware failure is expected, not exceptional. HDFS replicates every block 3 times. If a node dies, processing automatically continues on replica nodes.</li>
  <li><strong>Scalability</strong>: Add commodity machines linearly. 10x more data? Add 10x more nodes. No re-architecture needed.</li>
  <li><strong>Data locality</strong>: MapReduce schedules tasks on the node where the data block is stored. Reduces network I/O drastically.</li>
  <li><strong>Write Once, Read Many</strong>: Files in HDFS are immutable. Optimized for high-throughput sequential reads.</li>
  <li><strong>Simple programming model</strong>: Developers only write Map() and Reduce() functions. Hadoop handles all distributed complexity (splitting, shuffling, sorting, fault recovery).</li>
</ul>
<h3>Hadoop Cluster Modes</h3>
<ul>
  <li><strong>Standalone mode</strong>: Single machine, for testing/development.</li>
  <li><strong>Pseudo-distributed mode</strong>: Single machine simulating a cluster.</li>
  <li><strong>Fully distributed mode</strong>: Production — multiple physical machines.</li>
</ul>
<div><span class="keyword">Move code to data</span><span class="keyword">Fault tolerance</span><span class="keyword">Data locality</span><span class="keyword">WORM</span><span class="keyword">Commodity hardware</span><span class="keyword">Horizontal scale</span></div>`

    title: "RDD — Resilient Distributed Datasets and Operations",
    content: `
<h3>Definition</h3>
<p><strong>RDD (Resilient Distributed Dataset)</strong> is the fundamental data structure of Apache Spark. It is an <strong>immutable, fault-tolerant, distributed collection of objects</strong> that can be processed in parallel across a cluster.</p>
<ul>
  <li><strong>Resilient</strong>: Fault-tolerant — can recompute lost partitions using lineage graph.</li>
  <li><strong>Distributed</strong>: Data is split into partitions across multiple nodes in the cluster.</li>
  <li><strong>Dataset</strong>: A collection of data records (like rows in a database).</li>
</ul>
<h3>RDD Properties</h3>
<ul>
  <li><strong>Immutable</strong>: Once created, RDD cannot be changed. Transformations create new RDDs.</li>
  <li><strong>Lazy evaluation</strong>: Transformations are NOT executed immediately — they are recorded. Execution happens only when an Action is called.</li>
  <li><strong>Lineage (DAG)</strong>: Spark tracks the sequence of transformations (lineage graph) to recompute lost data.</li>
  <li><strong>Partitioned</strong>: Data is divided into partitions, each partition processed on one node.</li>
</ul>
<div class="diagram">  Original Data (File)
        │
        ▼
  RDD1 (load) → Partition1 [Node1]
               → Partition2 [Node2]
               → Partition3 [Node3]
        │
        ▼ Transformation (map, filter...)
  RDD2 (transformed)
        │
        ▼ Action (collect, count...)
  Final Result → Driver Program</div>
<h3>RDD Creation Methods</h3>
<ul>
  <li>From files: <code>sc.textFile("hdfs://path/to/file.txt")</code></li>
  <li>From collections: <code>sc.parallelize([1, 2, 3, 4, 5])</code></li>
  <li>From transformations on existing RDDs.</li>
</ul>
<h3>RDD Operations — Two Types</h3>
<h3>1. Transformations (Lazy — return new RDD)</h3>
<table class="comparison-table">
  <tr><th>Operation</th><th>Description</th><th>Example</th></tr>
  <tr><td>map(f)</td><td>Apply function f to each element</td><td>rdd.map(x => x * 2)</td></tr>
  <tr><td>filter(f)</td><td>Keep elements where f returns true</td><td>rdd.filter(x => x > 5)</td></tr>
  <tr><td>flatMap(f)</td><td>Map then flatten the result</td><td>rdd.flatMap(line => line.split(" "))</td></tr>
  <tr><td>reduceByKey(f)</td><td>Combine values with same key</td><td>rdd.reduceByKey(_ + _)</td></tr>
  <tr><td>groupByKey()</td><td>Group values by key</td><td>rdd.groupByKey()</td></tr>
  <tr><td>distinct()</td><td>Remove duplicates</td><td>rdd.distinct()</td></tr>
  <tr><td>union(rdd2)</td><td>Combine two RDDs</td><td>rdd1.union(rdd2)</td></tr>
  <tr><td>join(rdd2)</td><td>Inner join on keys</td><td>rdd1.join(rdd2)</td></tr>
</table>
<h3>2. Actions (Trigger execution — return value)</h3>
<table class="comparison-table">
  <tr><th>Operation</th><th>Description</th><th>Example</th></tr>
  <tr><td>collect()</td><td>Return all elements to driver</td><td>rdd.collect()</td></tr>
  <tr><td>count()</td><td>Count number of elements</td><td>rdd.count() → 100</td></tr>
  <tr><td>first()</td><td>Return first element</td><td>rdd.first()</td></tr>
  <tr><td>take(n)</td><td>Return first n elements</td><td>rdd.take(5)</td></tr>
  <tr><td>reduce(f)</td><td>Aggregate all elements</td><td>rdd.reduce(_ + _)</td></tr>
  <tr><td>saveAsTextFile()</td><td>Save RDD to HDFS/disk</td><td>rdd.saveAsTextFile("output/")</td></tr>
</table>
<h3>Real-life Example: Word Count with RDD</h3>
<div class="diagram">  Input: "hello world hello spark"
  Step 1: textFile() → RDD["hello world hello spark"]
  Step 2: flatMap(split) → RDD["hello","world","hello","spark"]
  Step 3: map(word=>(word,1)) → RDD[("hello",1),("world",1),("hello",1),("spark",1)]
  Step 4: reduceByKey(+) → RDD[("hello",2),("world",1),("spark",1)]
  Step 5: collect() → Prints result</div>
<div><span class="keyword">Resilient</span><span class="keyword">Distributed</span><span class="keyword">Immutable</span><span class="keyword">Lazy evaluation</span><span class="keyword">Lineage graph</span><span class="keyword">Transformations</span><span class="keyword">Actions</span></div>
<div class="conclusion">Conclusion: RDDs are the backbone of Spark. Their lazy evaluation + lineage graph make Spark 100x faster than Hadoop MapReduce for iterative algorithms like machine learning.</div>`
  },

    num: "C20", section: "C", marks: "10 marks",
    title: "Apache Spark — Architecture, Features and Working",
    content: `
<h3>Definition</h3>
<p><strong>Apache Spark</strong> is a fast, general-purpose, open-source distributed computing system. It is up to <strong>100x faster than Hadoop MapReduce</strong> because it processes data <strong>in-memory</strong> (RAM) instead of reading/writing to disk at each step.</p>
<h3>Why Spark over MapReduce?</h3>
<table class="comparison-table">
  <tr><th>Feature</th><th>Hadoop MapReduce</th><th>Apache Spark</th></tr>
  <tr><td>Processing</td><td>Disk-based (slow)</td><td>In-memory (fast)</td></tr>
  <tr><td>Speed</td><td>Baseline</td><td>Up to 100x faster</td></tr>
  <tr><td>Languages</td><td>Java mainly</td><td>Java, Scala, Python, R</td></tr>
  <tr><td>Streaming</td><td>Not native</td><td>Spark Streaming built-in</td></tr>
  <tr><td>ML Support</td><td>Mahout (limited)</td><td>MLlib (rich library)</td></tr>
  <tr><td>Graph Processing</td><td>No</td><td>GraphX built-in</td></tr>
</table>
<h3>Spark Architecture</h3>
<div class="diagram">  ┌─────────────────────────────────────────────┐
  │              Spark Application               │
  │  ┌──────────┐    ┌──────────────────────┐   │
  │  │  Driver  │    │   SparkContext (SC)   │   │
  │  │ Program  │────│  (Entry point to Spark│   │
  │  └──────────┘    └──────────────────────┘   │
  └───────────────────────────────┬─────────────┘
                                  │ talks to
                          ┌───────▼───────┐
                          │ Cluster Manager│
                          │(YARN/Mesos/   │
                          │ Standalone)   │
                          └───────┬───────┘
              ┌──────────────────┼──────────────────┐
              ▼                  ▼                   ▼
       ┌────────────┐    ┌────────────┐     ┌────────────┐
       │  Worker    │    │  Worker    │     │  Worker    │
       │  Node 1    │    │  Node 2    │     │  Node 3    │
       │ ┌────────┐ │    │ ┌────────┐ │     │ ┌────────┐ │
       │ │Executor│ │    │ │Executor│ │     │ │Executor│ │
       │ │(Tasks) │ │    │ │(Tasks) │ │     │ │(Tasks) │ │
       │ └────────┘ │    │ └────────┘ │     │ └────────┘ │
       └────────────┘    └────────────┘     └────────────┘</div>
<h3>Architecture Components</h3>
<ul>
  <li><strong>Driver Program</strong>: Main program that defines and submits Spark jobs. Contains SparkContext.</li>
  <li><strong>SparkContext</strong>: Entry point — connects to cluster manager, creates RDDs, distributes tasks.</li>
  <li><strong>Cluster Manager</strong>: Allocates resources. Can be YARN, Apache Mesos, or Spark's Standalone manager.</li>
  <li><strong>Worker Nodes</strong>: Execute assigned tasks. Each has one or more Executors.</li>
  <li><strong>Executors</strong>: JVM processes on worker nodes that run tasks and cache data in memory.</li>
</ul>
<h3>Spark Ecosystem (Libraries)</h3>
<ul>
  <li><strong>Spark Core</strong>: Foundation — RDDs, scheduling, memory management.</li>
  <li><strong>Spark SQL</strong>: Query structured data using SQL syntax; uses DataFrames.</li>
  <li><strong>Spark Streaming</strong>: Process real-time data streams (e.g., Twitter feeds, Kafka streams).</li>
  <li><strong>MLlib</strong>: Machine learning library — classification, regression, clustering.</li>
  <li><strong>GraphX</strong>: Graph processing (e.g., social network analysis).</li>
</ul>
<h3>How Spark Works (Step-by-Step)</h3>
<ol>
  <li>User submits a Spark application from Driver.</li>
  <li>SparkContext connects to Cluster Manager and requests resources.</li>
  <li>Cluster Manager launches Executors on Worker Nodes.</li>
  <li>SparkContext sends application code (JAR/Python) to Executors.</li>
  <li>SparkContext creates an RDD and builds a DAG (Directed Acyclic Graph) of transformations.</li>
  <li>DAG Scheduler breaks DAG into stages; Task Scheduler assigns tasks to Executors.</li>
  <li>Executors run tasks, cache intermediate results in memory (RAM).</li>
  <li>Results are returned to Driver when an Action is called.</li>
</ol>
<div><span class="keyword">In-memory processing</span><span class="keyword">RDD</span><span class="keyword">DAG</span><span class="keyword">SparkContext</span><span class="keyword">Executor</span><span class="keyword">Driver</span><span class="keyword">MLlib</span><span class="keyword">Spark Streaming</span></div>`

    content: `
<h3>Definition</h3>
<p><strong>MapReduce</strong> is a programming model and processing engine for distributed computation of large datasets. It consists of two main phases: <strong>Map</strong> (splitting/filtering) and <strong>Reduce</strong> (aggregating/summarizing).</p>
<p>The name comes from the functional programming concepts of map (apply to each element) and reduce (aggregate elements).</p>
<h3>Core Concept</h3>
<ul>
  <li><strong>Divide and Conquer</strong>: Split a big problem into small sub-problems, solve in parallel, combine results.</li>
  <li><strong>Data locality</strong>: Send the computation code to where data is stored (not the other way).</li>
</ul>
<h3>Complete MapReduce Data Flow</h3>
<div class="diagram">  INPUT FILE (HDFS)
  "Hello World Hello Hadoop World"
         │
         ▼
  ┌─────────────┐
  │  INPUT SPLIT │  File divided into chunks (one per Map task)
  └──────┬──────┘
         │
         ▼
  ┌─────────────┐
  │   RECORD    │  Each line becomes key-value pair
  │   READER    │  Key=byte offset, Value=line text
  └──────┬──────┘
         │
         ▼
  ┌─────────────────────────────┐
  │         MAP PHASE           │
  │  Input: (0, "Hello World")  │
  │  Output: (Hello,1)(World,1) │
  │  Input: (1, "Hello Hadoop") │
  │  Output: (Hello,1)(Hadoop,1)│
  └──────────────┬──────────────┘
                 │
                 ▼
  ┌─────────────────────────────┐
  │     SHUFFLE & SORT PHASE    │
  │  Groups same keys together  │
  │  (Hello,[1,1]) (World,[1,1])│
  │  (Hadoop,[1])               │
  └──────────────┬──────────────┘
                 │
                 ▼
  ┌─────────────────────────────┐
  │        REDUCE PHASE         │
  │  (Hello,[1,1]) → (Hello,2)  │
  │  (World,[1,1]) → (World,2)  │
  │  (Hadoop,[1])  → (Hadoop,1) │
  └──────────────┬──────────────┘
                 │
                 ▼
  OUTPUT FILE (HDFS)
  Hello  2
  World  2
  Hadoop 1</div>
<h3>Detailed Step Explanation</h3>
<h3>Step 1: Input Splitting</h3>
<p>HDFS breaks the input file into fixed-size splits (default 128 MB each). One Map task is created per split. All map tasks run in parallel on different nodes.</p>
<h3>Step 2: Mapping</h3>
<p>The user-defined <strong>Map function</strong> processes each record and emits intermediate key-value pairs. It processes data locally on the node where the data block is stored (data locality).</p>
<h3>Step 3: Combiner (Optional but Important)</h3>
<p>A mini-reducer that runs on the same node as the Mapper. It reduces intermediate data before sending it over the network — saves bandwidth. Example: Instead of sending (Hello,1)(Hello,1), it sends (Hello,2).</p>
<h3>Step 4: Shuffle and Sort</h3>
<p>All intermediate key-value pairs are sorted by key and transferred (shuffled) to the appropriate Reducer. This is the most expensive phase (network I/O).</p>
<h3>Step 5: Reducing</h3>
<p>The user-defined <strong>Reduce function</strong> receives each unique key with a list of all its values and produces the final output.</p>
<h3>Step 6: Output Writing</h3>
<p>Final key-value output is written to HDFS. Each Reducer writes one output file (part-r-00000, part-r-00001, etc.).</p>
<h3>MapReduce Application Examples</h3>
<ul>
  <li>Word count in Wikipedia (1.8 billion+ articles).</li>
  <li>Google's web indexing pipeline (original use case).</li>
  <li>Log analysis (counting errors by type across millions of log files).</li>
</ul>
<div><span class="keyword">Map phase</span><span class="keyword">Reduce phase</span><span class="keyword">Shuffle and Sort</span><span class="keyword">Combiner</span><span class="keyword">Data locality</span><span class="keyword">Parallel processing</span><span class="keyword">Key-value pairs</span></div>
<div class="conclusion">Conclusion: MapReduce elegantly solves the problem of processing massive datasets by parallelizing both storage and computation. Though Spark has surpassed it for interactive workloads, MapReduce remains the conceptual foundation of Big Data processing.</div>`

    content: `
<h3>Definition</h3>
<p><strong>YARN (Yet Another Resource Negotiator)</strong> is the resource management layer of Hadoop 2.x and above. It separates resource management from data processing, allowing Hadoop to run multiple types of applications (not just MapReduce) on the same cluster.</p>
<h3>Why YARN? (Problems with Hadoop 1.x)</h3>
<ul>
  <li>In Hadoop 1.x, the JobTracker did everything — resource management AND job scheduling. This caused a single point of failure and didn't scale beyond ~4000 nodes.</li>
  <li>YARN splits these responsibilities into separate daemons, solving scalability and flexibility issues.</li>
</ul>
<h3>YARN Architecture Diagram</h3>
<div class="diagram">  ┌────────────────────────────────────────────────────┐
  │              RESOURCE MANAGER (1 per cluster)       │
  │  ┌─────────────────┐  ┌────────────────────────┐   │
  │  │   Scheduler     │  │ Applications Manager   │   │
  │  │(allocates       │  │(manages AM lifecycle,  │   │
  │  │ resources)      │  │ restarts on failure)   │   │
  │  └─────────────────┘  └────────────────────────┘   │
  └──────────────────────┬─────────────────────────────┘
                         │
         ┌───────────────┼───────────────┐
         ▼               ▼               ▼
  ┌─────────────┐ ┌─────────────┐ ┌─────────────┐
  │  NODE MGR 1 │ │  NODE MGR 2 │ │  NODE MGR 3 │
  │ ┌─────────┐ │ │ ┌─────────┐ │ │ ┌─────────┐ │
  │ │   App   │ │ │ │   App   │ │ │ │   App   │ │
  │ │ Master  │ │ │ │ Master  │ │ │ │ Master  │ │
  │ └─────────┘ │ │ └─────────┘ │ │ └─────────┘ │
  │ ┌─────────┐ │ │ ┌─────────┐ │ │ ┌─────────┐ │
  │ │Container│ │ │ │Container│ │ │ │Container│ │
  │ │(Task)   │ │ │ │(Task)   │ │ │ │(Task)   │ │
  │ └─────────┘ │ │ └─────────┘ │ │ └─────────┘ │
  └─────────────┘ └─────────────┘ └─────────────┘</div>
<h3>YARN Components Explained</h3>
<h3>1. Resource Manager (RM)</h3>
<p>The master daemon that manages cluster resources globally. Has two sub-components:</p>
<ul>
  <li><strong>Scheduler</strong>: Allocates resources (CPU, memory) to applications. Does NOT monitor or restart tasks — purely resource allocation. Supports pluggable schedulers: FIFO, Capacity Scheduler, Fair Scheduler.</li>
  <li><strong>Applications Manager (AsM)</strong>: Accepts job submissions, validates resource requirements, launches ApplicationMasters, and restarts them on failure.</li>
</ul>
<h3>2. Node Manager (NM)</h3>
<p>Runs on every worker node. Reports node health (CPU, memory) to Resource Manager via heartbeats. Manages and monitors containers on its node. Kills containers if instructed by Resource Manager.</p>
<h3>3. Application Master (AM)</h3>
<p>One per application (not cluster). Negotiates resources from Resource Manager. Coordinates task execution within the application. Monitors task progress and handles failures by rescheduling tasks.</p>
<h3>4. Container</h3>
<p>A bundle of resources (a specific amount of CPU + memory) allocated by YARN on a worker node. Each Map or Reduce task runs inside a container. Container = unit of resource allocation in YARN.</p>
<h3>YARN Job Submission Flow</h3>
<ol>
  <li>Client submits application to Resource Manager.</li>
  <li>Resource Manager allocates a container and starts Application Master in it.</li>
  <li>Application Master registers with Resource Manager and requests containers for tasks.</li>
  <li>Resource Manager's Scheduler allocates containers; Node Managers launch them.</li>
  <li>Tasks run inside containers; Application Master monitors progress.</li>
  <li>On completion, Application Master unregisters from Resource Manager and releases containers.</li>
</ol>
<h3>YARN Schedulers</h3>
<table class="comparison-table">
  <tr><th>Scheduler</th><th>Strategy</th><th>Best For</th></tr>
  <tr><td>FIFO</td><td>First-in, first-out queue</td><td>Simple test clusters</td></tr>
  <tr><td>Capacity Scheduler</td><td>Partition cluster into queues with guaranteed capacity</td><td>Multi-tenant organizations</td></tr>
  <tr><td>Fair Scheduler</td><td>Equal resource sharing across all apps</td><td>Mixed workloads</td></tr>
</table>
<div><span class="keyword">YARN</span><span class="keyword">Resource Manager</span><span class="keyword">Node Manager</span><span class="keyword">Application Master</span><span class="keyword">Container</span><span class="keyword">Scheduler</span><span class="keyword">Heartbeat</span></div>
<div class="conclusion">Conclusion: YARN transformed Hadoop from a single-use MapReduce platform into a general-purpose data operating system. By separating resource management from job scheduling, YARN allows Spark, Hive, HBase, and MapReduce to all share the same cluster efficiently.</div>`
  },

    content: `
<h3>Definition</h3>
<p><strong>NoSQL (Not Only SQL)</strong> databases are non-relational database management systems designed to store, retrieve, and manage large volumes of unstructured and semi-structured data. They sacrifice some ACID properties for scalability and flexibility.</p>
<h3>Why NoSQL? (Limitations of RDBMS for Big Data)</h3>
<ul>
  <li>RDBMS doesn't scale horizontally to petabytes of data efficiently.</li>
  <li>Fixed schema can't handle diverse, evolving data formats.</li>
  <li>RDBMS struggles with high-velocity real-time writes (millions per second).</li>
  <li>Not designed for distributed, geographically spread deployments.</li>
</ul>
<h3>NoSQL vs RDBMS — Comparison Table</h3>
<table class="comparison-table">
  <tr><th>Feature</th><th>RDBMS (SQL)</th><th>NoSQL</th></tr>
  <tr><td>Data Model</td><td>Tables (rows & columns)</td><td>Key-Value, Document, Column, Graph</td></tr>
  <tr><td>Schema</td><td>Fixed, predefined</td><td>Dynamic / schema-less</td></tr>
  <tr><td>Scalability</td><td>Vertical (add bigger server)</td><td>Horizontal (add more servers)</td></tr>
  <tr><td>ACID Properties</td><td>Full ACID guaranteed</td><td>BASE (Eventually consistent)</td></tr>
  <tr><td>Joins</td><td>Supports complex joins</td><td>No joins (denormalized data)</td></tr>
  <tr><td>Query Language</td><td>Standardized SQL</td><td>Database-specific API or query language</td></tr>
  <tr><td>Transactions</td><td>Strong multi-table transactions</td><td>Limited or no multi-record transactions</td></tr>
  <tr><td>Best for</td><td>Structured data, financial systems</td><td>Big Data, real-time web, IoT, social media</td></tr>
  <tr><td>Examples</td><td>MySQL, PostgreSQL, Oracle, SQL Server</td><td>MongoDB, Cassandra, Redis, HBase, Neo4j</td></tr>
</table>
<h3>Types of NoSQL Databases</h3>
<h3>1. Key-Value Stores</h3>
<p>Simplest model. Data stored as key-value pairs (like a dictionary/hashmap). Extremely fast for simple lookups.</p>
<ul>
  <li>Examples: <strong>Redis, DynamoDB, Riak</strong></li>
  <li>Use case: Session management, caching, shopping cart data.</li>
  <li>Real example: Amazon uses DynamoDB to store user shopping sessions — retrieve any user's cart in milliseconds using their user_id as key.</li>
</ul>
<h3>2. Document Stores</h3>
<p>Stores data as JSON/BSON documents. Each document is self-contained and can have different fields. Supports nested structures.</p>
<ul>
  <li>Examples: <strong>MongoDB, CouchDB, Firebase Firestore</strong></li>
  <li>Use case: Content management, user profiles, catalogs.</li>
  <li>Real example: MongoDB stores Instagram user profiles as JSON documents — each profile can have different fields (some users have bio, some don't).</li>
</ul>
<h3>3. Column-Family (Wide Column) Stores</h3>
<p>Data organized by columns rather than rows. Rows can have different columns. Ideal for time-series and analytics data.</p>
<ul>
  <li>Examples: <strong>Apache Cassandra, HBase, Google Bigtable</strong></li>
  <li>Use case: Time-series data, IoT sensor readings, messaging systems.</li>
  <li>Real example: Netflix uses Cassandra to store viewing history — billions of events per day, written across multiple data centers with no downtime.</li>
</ul>
<h3>4. Graph Databases</h3>
<p>Stores data as nodes (entities) and edges (relationships). Optimized for relationship-heavy queries that are very slow in relational databases.</p>
<ul>
  <li>Examples: <strong>Neo4j, Amazon Neptune, JanusGraph</strong></li>
  <li>Use case: Social networks, fraud detection, recommendation engines.</li>
  <li>Real example: LinkedIn uses a graph database to answer "People You May Know" — traversing millions of friend-of-friend relationships instantly.</li>
</ul>
<h3>NoSQL Data Model Summary</h3>
<div class="diagram">  KEY-VALUE:        user_123 → {name:Ravi, age:25}
  
  DOCUMENT:         {_id:"u123", name:"Ravi",
                      purchases:[{item:"phone",price:15000}]}
  
  COLUMN-FAMILY:    Row: user_123
                    Col: name=Ravi | email=r@g.com | age=25
  
  GRAPH:            (Ravi)──FRIEND──(Priya)──FRIEND──(Arjun)
                    Query: Friends of friends of Ravi</div>
<div><span class="keyword">Key-Value</span><span class="keyword">Document Store</span><span class="keyword">Wide Column</span><span class="keyword">Graph DB</span><span class="keyword">BASE model</span><span class="keyword">Horizontal scaling</span><span class="keyword">Schema-less</span><span class="keyword">MongoDB</span><span class="keyword">Cassandra</span><span class="keyword">Redis</span><span class="keyword">Neo4j</span></div>
<div class="conclusion">Conclusion: NoSQL databases are NOT replacements for RDBMS — they are complements. Choose RDBMS when you need strong ACID transactions and structured data. Choose NoSQL when you need massive scale, flexible schemas, or specialized data models like graphs or key-value lookups.</div>`
  }

let activeSection = 'all';
let searchTerm = '';

function renderCards() {
  const container = document.getElementById('cards-container');
  const filtered = questions.filter(q => {
    const sectionMatch = activeSection === 'all' || q.section === activeSection;
    const searchMatch = !searchTerm ||
      q.title.toLowerCase().includes(searchTerm) ||
      q.content.toLowerCase().includes(searchTerm) ||
      q.num.toLowerCase().includes(searchTerm);
    return sectionMatch && searchMatch;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No questions match your search. Try different keywords.</div>';
    return;
  }

  container.innerHTML = filtered.map(q => {
    const secClass = q.section === 'A' ? 'sec-a' : q.section === 'B' ? 'sec-b' : 'sec-c';
    return `<div class="q-card" id="card-${q.num}">
      <div class="q-header" onclick="toggleCard('${q.num}')">
        <span class="q-num ${secClass}">Q${q.num} · Sec ${q.section}</span>
        <span class="q-title">${q.title}</span>
        <span class="marks">${q.marks}</span>
        <span class="chevron" id="chev-${q.num}">▼</span>
      </div>
      <div class="q-body" id="body-${q.num}">
        ${q.content}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(num) {
  const body = document.getElementById('body-' + num);
  const chev = document.getElementById('chev-' + num);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function filterSection(sec, btn) {
  activeSection = sec;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterCards() {
  searchTerm = document.getElementById('search').value.toLowerCase();
  renderCards();
}

function navigateToHash() {
  const rawHash = decodeURIComponent(window.location.hash || '');
  if (!rawHash) return;

  const cleanHash = rawHash.replace('#', '');
  const qNum = cleanHash.startsWith('card-') ? cleanHash.slice(5) : cleanHash;
  const targetQuestion = questions.find(q => q.num.toLowerCase() === qNum.toLowerCase());
  if (!targetQuestion) return;

  searchTerm = '';
  document.getElementById('search').value = '';

  const sectionTab = document.querySelector(`.tab[data-sec="${targetQuestion.section}"]`);
  if (sectionTab) {
    activeSection = targetQuestion.section;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    sectionTab.classList.add('active');
  }

  renderCards();

  requestAnimationFrame(() => {
    const body = document.getElementById('body-' + targetQuestion.num);
    const card = document.getElementById('card-' + targetQuestion.num);
    if (body && !body.classList.contains('open')) {
      toggleCard(targetQuestion.num);
    }
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
}

function addHomeButton() {
  const btn = document.createElement('a');
  btn.href = '../index.html';
  btn.textContent = '🏠 Home';
  btn.setAttribute('style', 'position:fixed;right:18px;bottom:18px;z-index:9999;background:#1B4F8A;color:#fff;text-decoration:none;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:600;box-shadow:0 6px 18px rgba(0,0,0,0.18);');
  document.body.appendChild(btn);
}

renderCards();
navigateToHash();
window.addEventListener('hashchange', navigateToHash);
addHomeButton();
</script>
