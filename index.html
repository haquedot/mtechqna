<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.Tech Q&A Hub</title>
  <meta name="description" content="M.Tech Q&A Web App with subject-wise navigation, syllabus access, and global search across Big Data and Blockchain papers.">

  <meta property="og:type" content="website">
  <meta property="og:title" content="M.Tech Q&A Web App">
  <meta property="og:description" content="Subject-wise navigation, syllabus-first access, and global question search across all uploaded papers.">
  <meta property="og:image" content="images/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="M.Tech Q&A Web App">
  <meta name="twitter:description" content="Subject-wise navigation, syllabus-first access, and global question search across all uploaded papers.">
  <meta name="twitter:image" content="images/og-image.png">

  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>M.Tech Q&A Web App</h1>
      <p>Subject-wise navigation, syllabus-first access, and global question search across all uploaded papers.</p>
      <div class="hero-meta">
        <span class="badge">Semester 2</span>
        <span class="badge">Big Data + Blockchain</span>
        <span class="badge">Fast Search: Press /</span>
      </div>
    </section>

    <section class="search-wrap">
      <div class="search-label">Global Search</div>
      <input id="global-search" class="global-search" type="search" placeholder="Search all questions and topics (e.g. Spark, YARN, NoSQL, RAFT, Merkle...)" autocomplete="off">
      <div class="stats" id="stats"></div>
    </section>

    <section class="grid" id="subject-grid"></section>

    <section class="results-wrap">
      <div class="results-head">Search Results — <span id="result-count">0 results</span></div>
      <div class="results" id="results"></div>
    </section>
  </main>

  <script src="search-index.js"></script>
  <script src="app.js"></script>
</body>
</html>
